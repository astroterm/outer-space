---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app longhorn
  namespace: &namespace flux-system
spec:
  targetNamespace: longhorn-system

  interval: 1h
  retryInterval: 5m
  timeout: 10m
  prune: true

  path: ./kubernetes/apps/longhorn-system/longhorn/app

  sourceRef:
    kind: GitRepository
    name: outer-space

  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
