---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: 1.96.5
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: tailscale-values

    - targetPath: oauth.clientId
      kind: Secret
      name: tailscale-auth
      valuesKey: clientId

    - targetPath: oauth.clientSecret
      kind: Secret
      name: tailscale-auth
      valuesKey: clientSecret