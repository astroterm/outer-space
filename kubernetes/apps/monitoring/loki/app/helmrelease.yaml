---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: loki
      version: 11.3.2
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  valuesFrom:
    - name: loki-values
      kind: ConfigMap