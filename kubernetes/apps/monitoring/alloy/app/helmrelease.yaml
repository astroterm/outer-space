---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: alloy
      version: 1.7.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  valuesFrom:
    - name: alloy-values
      kind: ConfigMap