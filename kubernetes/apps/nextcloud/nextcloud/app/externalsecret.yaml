apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical

  target:
    name: nextcloud-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        nextcloud-username: "{{ .username }}"
        nextcloud-password: "{{ .password }}"
        redis-password: "{{ .redis }}"
        mariadb-username: "{{ .mariadb_username }}"
        mariadb-root-password: "{{ .mariadb_root_password }}"
        mariadb-replication-password: "{{ .mariadb_replication_password }}"
        mariadb-password: "{{ .mariadb_password }}"

  dataFrom:
    - extract:
        key: nextcloud
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-db
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical

  target:
    name: nextcloud-db
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"

  dataFrom:
    - extract:
        key: nextcloud-db