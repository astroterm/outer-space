---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: es-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: external-secrets
      version: 2.4.1
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: es-values
