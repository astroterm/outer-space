---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: issuers
  namespace: flux-system
spec:
  targetNamespace: &namespace networking

  interval: 1h
  retryInterval: 5m
  timeout: 10m
  prune: true

  path: ./kubernetes/apps/networking/resources/issuers

  sourceRef:
    kind: GitRepository
    name: outer-space

  dependsOn:
    - name: cert-manager
      namespace: *namespace

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: certificates
  namespace: flux-system
spec:
  targetNamespace: &namespace networking

  interval: 1h
  retryInterval: 5m
  timeout: 10m
  prune: true

  path: ./kubernetes/apps/networking/resources/certificates

  sourceRef:
    kind: GitRepository
    name: outer-space

  dependsOn:
    - name: cert-manager
      namespace: *namespace
    - name: issuers
      namespace: *namespace

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateways
  namespace: flux-system
spec:
  targetNamespace: &namespace networking

  interval: 1h
  retryInterval: 5m
  timeout: 10m
  prune: true

  path: ./kubernetes/apps/networking/resources/gateways

  sourceRef:
    kind: GitRepository
    name: outer-space

  dependsOn:
    - name: certificates
      namespace: *namespace
