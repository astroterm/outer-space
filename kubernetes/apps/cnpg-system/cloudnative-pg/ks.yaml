---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cloudnative-pg
  namespace: flux-system
spec:
  targetNamespace: &namespace cnpg-system

  interval: 1h
  retryInterval: 5m
  timeout: 10m
  prune: true

  path: ./kubernetes/apps/cnpg-system/cloudnative-pg/app

  sourceRef:
    kind: GitRepository
    name: outer-space

  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cnpg-cluster
  namespace: flux-system
spec:
  targetNamespace: &namespace cnpg-system

  interval: 1h
  retryInterval: 5m
  timeout: 10m
  prune: true

  path: ./kubernetes/apps/cnpg-system/cloudnative-pg/cluster

  sourceRef:
    kind: GitRepository
    name: outer-space

  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
