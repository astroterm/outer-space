apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical

  target:
    name: cnpg-secret
    type: kubernetes.io/basic-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"

  dataFrom:
    - extract:
        key: cloudnativepg